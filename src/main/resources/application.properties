spring.application.name=social-commerce

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/socialcommerce
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/socialcommerce

# JWT
jwt.secret=SocialCommerceSecretKeyThatIsAtLeast32CharactersLong
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Server
server.port=8080

# Allow circular references (sometimes needed in Spring Boot 3)
spring.main.allow-circular-references=true